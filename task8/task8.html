<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>vowel and consonant</h1>
    <script>
   let ch=Number(prompt("enter a single lowercase alphabet"));
   if(ch ==="a" || ch === "e" || ch === "i" || ch === "o" || ch === "u"){
    alert("vowel")
   }
   else{
    alert("consonant")
   }
    </script>
</body>
</html>
