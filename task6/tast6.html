<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<body>
    <h1>find greater number</h1>
    <script>
        
        let num1=Number(prompt("enter first number:"));
        let num2=Number(prompt("enter second number:"));
        let num3=Number(prompt("enter third number:"));
      
        if (num1 > num2 && num1 > num3){
            alert(num1 + "it is largest number then num2 and num3");
        }
         else if (num2 > num1 && num2 > num3){
            alert(num2 + "it is largest number then num1 and num3");
         }
        else{
            alert(num3 + "it is largest number then num1 and num2")
        }
    </script>
</body>
</html>
