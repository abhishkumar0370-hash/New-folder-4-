<!DOCTYPE html>

<body>
    <h1>leap year chacking</h1>
    <script>
    let year=Number(prompt("Enter a year:"));
    if(year % 4 === 0 ){
        alert("it is a leap year");
    }
    else{
        alert("it is not a leap year");
    }
    
    </script>
</body>
